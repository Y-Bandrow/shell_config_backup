# --- 字体与大小 ---
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

# --- 拯救“太丑”的核心：窗口间距 (Padding) ---
# 默认的 Kitty 字都贴在屏幕最边缘，加上边距立刻变高级
window_padding_width 0 

# --- 现代感：半透明与毛玻璃 (仅限支持的桌面环境) ---
# 如果你用的是 Fedora 43 默认的 GNOME 桌面，这会让窗口带有一点优雅的通透感
background_opacity 1

# --- 窗口极简美化 (新增：隐藏顶部标题栏) ---
hide_window_decorations yes

# --- 标签页美化 (如果你用多标签) ---
tab_bar_style               powerline
tab_bar_edge                top
tab_powerline_style         slanted

# --- 光标样式 ---
cursor_shape block
shell_integration dashed cursor


#================================================

background #222436
foreground #c8d3f5
selection_background #2d3f76
selection_foreground #c8d3f5
url_color #4fd6be
cursor #c8d3f5
cursor_text_color #222436

# Tabs
active_tab_background #82aaff
active_tab_foreground #1e2030
inactive_tab_background #2f334d
inactive_tab_foreground #545c7e
#tab_bar_background #1b1d2b

# Windows
active_border_color #82aaff
inactive_border_color #2f334d

# normal
color0 #1b1d2b
color1 #ff757f
color2 #c3e88d
color3 #ffc777
color4 #82aaff
color5 #c099ff
color6 #86e1fc
color7 #828bb8

# bright
color8  #444a73
color9  #ff8d94
color10 #c7fb6d
color11 #ffd8ab
color12 #9ab8ff
color13 #caabff
color14 #b2ebff
color15 #c8d3f5

# extended colors
color16 #ff966c
color17 #c53b53

#================================================
# --- 快捷键：Alt + 数字 切换标签页 ---
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

map shift+page_up   scroll_page_up
map shift+page_down scroll_page_down

# --- 只要键盘一打字，立刻自动滚回最底部 ---
scroll_to_be_on_input yes

